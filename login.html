<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập quản lý — The Cake Lab</title>
  <style>
    :root {
      --cream: #fcf6ed;
      --orange: #e8632f;
      --blue: #032c7d;
      --ink: #241b12;
      --line: rgba(36, 27, 18, 0.14);
      --muted: #7f6f5f;
      --bg: #f4f1ec;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
    }
    .card {
      width: min(520px, 100%);
      background: #fff;
      padding: 24px;
      border-radius: 24px;
      border: 1px solid var(--line);
      box-shadow: 0 16px 40px rgba(36, 27, 18, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0 0 16px; color: var(--muted); line-height: 1.6; }
    label { display: block; font-weight: 700; margin-bottom: 7px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      margin-bottom: 12px;
      font-size: 15px;
    }
    .btn {
      width: 100%;
      border: none;
      padding: 12px 16px;
      border-radius: 999px;
      background: var(--orange);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .password-field { position: relative; }
    .password-field input { padding-right: 44px; }
    .password-toggle {
      position: absolute;
      top: 0;
      right: 4px;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 10px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
    }
    .password-toggle svg { width: 20px; height: 20px; }
    .error { margin-top: 10px; color: #c0392b; font-weight: 700; min-height: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Đăng nhập quản lý</h1>
    <p>Đăng nhập bằng tài khoản quản lý cửa hàng hoặc tài khoản online để bật/tắt sản phẩm trong menu.</p>
    <form id="loginForm">
      <label for="username">Tên đăng nhập</label>
      <input id="username" name="username" placeholder="manager1 hoặc online" required />
      <label for="password">Mật khẩu</label>
      <div class="password-field">
        <input id="password" name="password" type="password" placeholder="Nhập mật khẩu" required />
        <button type="button" class="password-toggle" id="togglePassword" aria-label="Hiện mật khẩu">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button class="btn" type="submit">Đăng nhập</button>
      <div class="error" id="errorMsg"></div>
    </form>
  </div>

  <script>
    const ACCOUNTS = {
      manager1: { password: 'store1@123', role: 'manager', storeId: 'CS1', storeLabel: 'CS1 — Tuệ Tĩnh' },
      manager2: { password: 'store2@123', role: 'manager', storeId: 'CS2', storeLabel: 'CS2 — Times City' },
      manager3: { password: 'store3@123', role: 'manager', storeId: 'CS3', storeLabel: 'CS3 — Phan Bội Châu' },
      manager4: { password: 'store4@123', role: 'manager', storeId: 'CS4', storeLabel: 'CS4 — Trung Hòa' },
      online: { password: 'online@123', role: 'online' }
    };

    document.getElementById('togglePassword').addEventListener('click', () => {
      const input = document.getElementById('password');
      const btn = document.getElementById('togglePassword');
      const icon = document.getElementById('eyeIcon');
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.setAttribute('aria-label', showing ? 'Hiện mật khẩu' : 'Ẩn mật khẩu');
      icon.innerHTML = showing
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.6 21.6 0 0 1 5.06-6.06M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a21.6 21.6 0 0 1-2.61 3.94M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    });
    document.getElementById('loginForm').addEventListener('submit', (event) => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const account = ACCOUNTS[username];
      const errorMsg = document.getElementById('errorMsg');

      if (!account || account.password !== password) {
        errorMsg.textContent = 'Tên đăng nhập hoặc mật khẩu không đúng.';
        return;
      }

      localStorage.setItem('cakeLabAdminUser', JSON.stringify(account));
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
